<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Магазин одягу</title>

    {% load static %}
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>

<body>
    <header style="text-align: right; padding: 10px; background: #f5f5f5;">
        {% if user.is_authenticated %}
        Вітаю, {{ user.username }} | <a href="{% url 'sign_out' %}">Вийти</a>
        {% else %}
        <a href="{% url 'login_email' %}">Увійти</a> | <a href="{% url 'register' %}">Реєстрація</a>
        {% endif %}
    </header>

    <main style="padding: 20px;">
        {% block content %}
        {% endblock %}
    </main>

    <footer style="text-align: center; margin-top: 30px; padding: 10px; border-top: 1px solid #ccc;">
        2025 Магазин одягу "Wearo"
    </footer>
</body>

</html>
