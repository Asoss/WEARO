<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Особистий кабінет</title>
  <style>
    :root {
      --sidebar-width: 220px;
      --dark: #111;
      --muted: #666;
    }

    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .wrapper {
      display: flex;
      max-width: 1000px;
      width: 100%;
      gap: 24px;
      padding: 40px 20px;
    }

    /* Меню */
    .sidebar {
      width: var(--sidebar-width);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .profile {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      padding: 12px;
      border: 2px solid var(--dark);
      border-radius: 6px;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--dark);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }
    .name { line-height: 1; }
    .name .greet { font-size: 12px; color: var(--muted); display:block; }
    .name .user { font-weight: 700; font-size: 13px; display:block; }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
    }
    .menu a {
      display: block;
      padding: 10px 12px;
      text-decoration: none;
      color: #fff;
      background: var(--dark);
      font-size: 14px;
      border: 1px solid #222;
      border-radius: 4px;
    }
    .menu a:hover { background: #222; }

    /* Контент */
    .content {
      flex-grow: 1;
      background: #1f1f1f;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
      padding: 20px;
      border: 2px solid var(--dark);
      border-radius: 6px;
      gap: 20px;
    }

    .welcome-block {
      background: #fff;
      padding: 20px;
      border-radius: 6px;
    }
    .welcome-block .welcome {
      font-size: 22px;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 10px;
      display:block;
    }

    .box {
      border: 3px solid #fff;
      background: #1f1f1f;
      flex-grow: 1;
      width: 100%;
      height: 400px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <aside class="sidebar">
      <div class="profile">
        <div class="avatar">EM</div>
        <div class="name">
          <span class="greet">Привіт</span>
          <span class="user">{{ user.username }}</span>
        </div>
      </div>
      <nav class="menu">
        <a href="{% url 'my_orders' %}">Мої замовлення</a>
        <a href="{% url 'my_returns' %}">Повернення</a>
        <a href="{% url 'need_help' %}">Потрібна допомога</a>
        <a href="{% url 'my_details' %}">Мої дані</a>
        <a href="{% url 'password_reset' %}">Змінити пароль</a>
        <a href="{% url 'address_book' %}">Адресна книга</a>
        <a href="{% url 'payment_methods' %}">Спосіб оплати</a>
        <a href="{% url 'social_accounts' %}">Соцмережі</a>
        <a href="{% url 'sign_out' %}">Вихід</a>
      </nav>
    </aside>

    <main class="content">
      <div class="welcome-block">
        <div class="welcome">ЛАСКАВО ПРОСИМО ДО</div>
        <div class="welcome">ВАШОГО ОБЛІКОВОГО ЗАПИСУ</div>
      </div>
      <div class="box"></div>
    </main>
  </div>
</body>
</html>
