<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Особистий кабінет</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .wrapper {
      display: flex;
      background: #fff;
      padding: 40px;
      box-sizing: border-box;
    }
    .sidebar {
      width: 260px;
      background: #111;
      display: flex;
      flex-direction: column;
    }
    .profile {
      display: flex;
      align-items: center;
      padding: 20px;
      background: #fff;
      border: 2px solid #111;
      margin: 20px;
      margin-bottom: 0;
    }
    .avatar {
      width: 60px;
      height: 60px;
      background: #111;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
      color: #fff;
      margin-right: 15px;
    }
    .name span {
      display: block;
      font-size: 14px;
      color: #111;
    }
    .name strong {
      font-size: 16px;
      color: #111;
    }
    .menu {
      margin: 20px;
      margin-top: 10px;
    }
    .menu a {
      display: block;
      padding: 12px 15px;
      text-decoration: none;
      color: #fff;
      border-bottom: 1px solid #333;
      font-size: 14px;
      background: #111;
    }
    .menu a:hover {
      background: #222;
    }
    .content {
      flex-grow: 1;
      background: #1f1f1f;
      margin-left: 40px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
      padding: 20px;
      border: 2px solid #111;
    }
    .welcome-block {
      margin-bottom: 20px;
    }
    .welcome {
      display: inline-block;
      background: #fff;
      color: #000;
      font-size: 22px;
      font-weight: bold;
      text-transform: uppercase;
      padding: 6px 12px;
      margin-bottom: 6px;
      padding-right: 100px;
    }
    .box {
      border: 3px solid #fff;
      background: #1f1f1f;
      flex-grow: 1;
      width: 100%;
      height: 400px;
    }
    footer {
      background: #ddd;
      color: #333;
      font-size: 12px;
      padding: 10px;
      text-align: center;
      position: absolute;
      bottom: 0;
      width: 100%;
      left: 0;
    }
    footer a {
      color: #333;
      text-decoration: none;
      margin: 0 5px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="sidebar">
      <div class="profile">
        <div class="avatar">EM</div>
        <div class="name">
          <span>Привіт</span>
          <strong>{{ user.username }}</strong>
        </div>
      </div>
      <div class="menu">
        <a href="{% url 'my_orders' %}">Мої замовлення</a>
        <a href="{% url 'my_returns' %}">Повернення</a>
        <a href="{% url 'need_help' %}">Потрібна допомога</a>
        <a href="{% url 'my_details' %}">Мої дані</a>
        <a href="{% url 'password_reset' %}">Змінити пароль</a>
        <a href="{% url 'address_book' %}">Адресна книга</a>
        <a href="{% url 'payment_methods' %}">Спосіб оплати</a>
        <a href="{% url 'social_accounts' %}">Шукайте нас в соцмережах</a>
        <a href="{% url 'sign_out' %}">Вихід</a>
      </div>
    </div>

    <div class="content">
      <div class="welcome-block">
        <div class="welcome">ЛАСКАВО ПРОСИМО ДО</div>
        <br>
        <div class="welcome">ВАШОГО ОБЛІКОВОГО ЗАПИСУ</div>
      </div>
      <div class="box"></div>
    </div>
  </div>
  <footer>
    © WEARO 2025 року | <a href="#">Конфіденційність, файли cookie</a> | <a href="#">Умови</a> | <a href="#">Спеціальні можливості</a>
  </footer>
</body>
</html>
