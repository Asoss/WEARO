
{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Особистий кабінет</title>
  <style>
    :root {
      --sidebar-width: 280px;
      --dark: #111;
      --muted: #666;
    }

    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      display: flex;
      justify-content: center;
      min-height: 50vh;
    }

    .wrapper {
      display: flex;
      max-width: 1200px;
      width: 100%;
      gap: 24px;
      padding: 40px 20px;
    }

    /* Меню */
    .sidebar {
      width: var(--sidebar-width);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Профіль */
    .profile {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      padding: 16px 16px 16px 50px;
      border: 5px solid var(--dark); /* товстіша рамка */

    }

    /* Круглий аватар */
    .avatar {
      position: absolute;
      left: -30px;
      width: 60px;
      height: 60px;
      border-radius: 50%; /* коло */
      background: var(--dark);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 24px; /* більший текст */
      border: 4px solid #fff; /* товстіша рамка */
    }

    .name { line-height: 1; }
    .name .greet { 
      font-size: 14px; 
      color: var(--muted); 
      font-weight: 400; 
      display:block; 
    }
    .name .user { 
      font-weight: 400; 
      font-size: 16px; 
      display:block; 
    }

    /* Меню */
    .menu {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 15px;
    }
    .menu a {
      display: block;
      padding: 12px 16px;
      text-decoration: none;
      color: #fff;
      background: var(--dark);
      font-size: 15px;
      border: 1px solid #222;
      border-radius: 0; /* без заокруглень */
    }
    .menu a:hover { background: #222; }

    /* Контент */
    .content {
      flex-grow: 1;
      background: hsl(0, 0%, 0%);
      display: flex;
      flex-direction: column;
      padding: 24px;
      border: 2px solid var(--dark);
      border-radius: 0; /* без заокруглень */
      gap: 20px;
    }

    /* Welcome-блок */
    .welcome-block {
      background: #fff;
      padding: 10px;
      border-radius: 0; /* без заокруглень */
      width: 49%;
    }

    .welcome-block .welcome-line {
      font-size: 22px;
      font-weight: bold;
      text-transform: uppercase;
      display: block;
    }

    /* Фото в середині квадрата */
    .box {
      background: #1f1f1f;
      flex-grow: 1;
      width: 100%;
      height: 400px;
      border-radius: 0; 
      border: 5px solid #fff;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      overflow: hidden;
    }

    .box img {
      width: 600px;
      height: auto;
      display: block;
      border-radius: 0; /* без округлень */
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <aside class="sidebar">
      <div class="profile">
        <div class="avatar">
          {{ user.username|slice:":1" }}{{ user_form.last_name|slice:":1" }}
        </div>
        <div class="name">
          <span class="greet">Привіт</span>
          <span class="user">{{ user.username }}</span>
        </div>
      </div>
      <nav class="menu">
        <a href="{% url 'my_orders' %}">Мої замовлення</a>
        <a href="{% url 'my_returns' %}">Повернення</a>
        <a href="{% url 'need_help' %}">Потрібна допомога</a>
        <a href="{% url 'my_details' %}">Мої дані</a>
        <a href="{% url 'password_reset' %}">Змінити пароль</a>
        <a href="{% url 'address_book' %}">Адресна книга</a>
        <a href="{% url 'payment_methods' %}">Спосіб оплати</a>
        <a href="{% url 'social_accounts' %}">Соцмережі</a>
        <a href="{% url 'sign_out' %}">Вихід</a>
      </nav>
    </aside>

    <main class="content">
      <div class="welcome-block">
        <div class="welcome-line">ЛАСКАВО ПРОСИМО ДО</div>
        <div style="margin-bottom: 20px; background-color: #000;"></div>
        <div class="welcome-line">ВАШОГО ОБЛІКОВОГО ЗАПИСУ</div>
      </div>

      <div class="box">
        <img src="{% static 'account/circle.png' %}" alt="circle">
      </div>
    </main>
  </div>
</body>
</html>
